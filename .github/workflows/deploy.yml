name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy using ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        script: |
          # TODO: Change this to the actual path of your project on your server
          cd /path/to/your/project/folder
          
          # Pull the latest code from the main branch
          git pull origin main
          
          # Install dependencies (uncomment if needed)
          # npm install
          
          # Build the Next.js project (uncomment if needed)
          # npm run build
          
          # Restart the server using PM2 (uncomment and replace 'my-app' with your pm2 process name)
          # pm2 restart my-app

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusFlow</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>FocusFlow</h1>
      <p class="subtitle">Stay productive.</p>
    </header>
    
    <main>
      <div class="timer-container">
        <svg class="progress-ring" width="260" height="260">
          <circle class="progress-ring__circle_bg" stroke="rgba(255, 255, 255, 0.1)" stroke-width="8" fill="transparent" r="120" cx="130" cy="130"/>
          <circle class="progress-ring__circle" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="120" cx="130" cy="130"/>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FF512F" />
              <stop offset="100%" stop-color="#F09819" />
            </linearGradient>
          </defs>
        </svg>
        <div class="time-display" id="time">25:00</div>
      </div>
      
      <div class="controls">
        <button id="startBtn" class="btn primary">Start</button>
        <button id="resetBtn" class="btn secondary">Reset</button>
      </div>

      <div class="modes">
        <button class="mode-btn active" data-time="25">Work</button>
        <button class="mode-btn" data-time="5">Short Break</button>
        <button class="mode-btn" data-time="15">Long Break</button>
      </div>
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
